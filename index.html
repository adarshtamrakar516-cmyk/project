<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecureRegister — Create Account</title>

  <!-- Google reCAPTCHA -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="noise"></div>
  <div class="grid-overlay"></div>

  <main class="container">
    
    <!-- LEFT PANEL -->
    <aside class="brand-panel">
      <div class="brand-top">
        <div class="logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">SecureReg</span>
        </div>
        <p class="brand-tagline">Identity verification<br/>done right.</p>
      </div>

      <div class="security-badges">
        <div class="badge">
          <span class="badge-icon">🤖</span>
          <div>
            <div class="badge-label">Human Verify</div>
            <div class="badge-status" id="status-captcha">Waiting...</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- FORM -->
    <section class="form-panel">
      <h1>Create Account</h1>

      <form id="register-form">

        <input type="text" id="username" placeholder="Username" required>
        <input type="email" id="email" placeholder="Email" required>

        <input type="password" id="password" placeholder="Password" required>
        <input type="password" id="confirm-password" placeholder="Confirm Password" required>

        <!-- ✅ CAPTCHA -->
        <div style="margin: 15px 0;">
          <div class="g-recaptcha"
               data-sitekey="6LdZQLAsAAAAADP6c3ZXerC3kV2etjbyl6ZiAFyc">
          </div>
        </div>

        <button type="submit">Create Account</button>
      </form>

    </section>
  </main>

  <!-- ✅ SCRIPT AT BOTTOM -->
  <script>
    document.getElementById("register-form").addEventListener("submit", function(e) {

      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm-password").value;
      const captchaResponse = grecaptcha.getResponse();

      // Password check
      if (password !== confirmPassword) {
        e.preventDefault();
        alert("Passwords do not match!");
        return;
      }

      // CAPTCHA check
      if (captchaResponse.length === 0) {
        e.preventDefault();
        alert("Please verify that you are not a robot.");
        document.getElementById("status-captcha").textContent = "Failed ❌";
        return;
      }

      // Success
      document.getElementById("status-captcha").textContent = "Verified ✅";
    });
  </script>

</body>
</html>
